name: Magisk Build (25200)

on:
  workflow_dispatch:
    inputs:
      MAGISK_REPO:
        description: 'Magisk Repository URL'
        required: true
        default: 'https://github.com/zcg9783/Magisk'
      MAGISK_BRANCH:
        description: 'Magisk Repository Branch'
        required: true
        default: 'v25.2'
      PATCH_URL:
        description: 'Optional patch file URL (Leave empty to skip patching)'
        required: false
        default: ''

jobs:
  build:
    name: Build Magisk
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIRECT: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Clone Magisk
        run: |
          git clone --recurse-submodules ${{ github.event.inputs.MAGISK_REPO }} -b ${{ github.event.inputs.MAGISK_BRANCH }} ./Magisk || true
          echo "MAGISK_VERS=$(awk -F'=' '/magisk.versionCode/ {print $2}' Magisk/gradle.properties || echo 'unknown')" >> $GITHUB_ENV

      - name: Apply Patch
        if: ${{ github.event.inputs.PATCH_URL != '' }}
        continue-on-error: true
        run: |
          curl -o Magisk/native/jni/su/su_daemon.cpp "${{ github.event.inputs.PATCH_URL }}"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust@v1
        with:
          rust-version: "1.74"
          components: rustc, cargo
          profile: minimal

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}
          max-size: 10000M

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-build-cache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-build-cache-

      - name: Set up NDK
        run: cd Magisk && python build.py -v ndk
        shell: bash

      - name: Setup environment
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install --only-upgrade libstdc++6 -y

      - name: Build release
        continue-on-error: true
        run: cd Magisk && ./build.py -vr all
        env:
          PATH: ${{ env.PATH }}:$HOME/.cargo/bin

      - name: Stop gradle daemon
        run: cd Magisk && ./gradlew --stop

      - name: Upload native binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-native
          path: Magisk/native/out
          compression-level: 9

      - name: Upload out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-out
          path: Magisk/out
          compression-level: 9