name: Magisk Build (25200)

on:
  push:
    branches: [ master ]
    paths:
      - 'app/**'
      - 'native/**'
      - 'stub/**'
      - 'buildSrc/**'
      - 'build.py'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Magisk v25.2
    runs-on: ubuntu-22.04
    env:
      NDK_CCACHE: ${{ github.workspace }}/ccache
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Magisk v25.2 with submodules
        uses: actions/checkout@v3
        with:
          repository: topjohnwu/Magisk
          ref: v25.2
          submodules: recursive
          path: magisk-repo

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Set up ccache
        run: bash magisk-repo/.github/ccache.sh
        working-directory: magisk-repo

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-${{ hashFiles('magisk-repo/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Cache build cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.ccache
            ~/.gradle/caches/build-cache-*
          key: build-cache-${{ github.sha }}
          restore-keys: build-cache-

      - name: Set up NDK
        run: python build.py -v ndk
        working-directory: magisk-repo

      - name: Build release
        run: |
          ./ccache -zp
          python build.py -vr all
        working-directory: magisk-repo

      - name: Build debug
        run: |
          python build.py -v all
          ./ccache -s
        working-directory: magisk-repo

      - name: Stop gradle daemon
        run: ./gradlew --stop
        working-directory: magisk-repo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: magisk-build-${{ github.sha }}
          path: magisk-repo/out