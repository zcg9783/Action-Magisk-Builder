name: Magisk Build (Very Legacy)

on:
  workflow_dispatch:
    inputs:
      MAGISK_REPO:
        description: 'Magisk Repository'
        required: true
        default: 'https://github.com/zcg9783/Magisk'
      MAGISK_BRANCH:
        description: 'Magisk Repository Branch'
        required: true
        default: 'v22.1'

jobs:
  build:
    name: Build Magisk
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIRECT: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Clone Magisk
        run: |
          git clone --depth=1 --recurse-submodules ${{ inputs.MAGISK_REPO }} -b ${{ inputs.MAGISK_BRANCH }} Magisk
          echo "MAGISK_VERS=$(awk -F'=' '/magisk.versionCode/ {print $2}' Magisk/gradle.properties)" >> $GITHUB_ENV
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"

      - name: Add Maven Repositories
        run: |
          find Magisk -name 'build.gradle' -exec sed -i "1s/^/buildscript { repositories { google(); mavenCentral() } }\n/" {} \;
          find Magisk -name 'build.gradle' -exec sed -i "/repositories {/a\        maven { url 'https://jitpack.io' }" {} \;

      - name: Set up NDK
        run: |
          cd Magisk
          python build.py -v ndk

      - name: Build artifacts
        run: |
          cd Magisk
          ./gradlew --stop
          ./build.py -vr all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magisk-build-${{ github.run_id }}
          path: |
            Magisk/out/*.apk
            Magisk/native/out/**/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: always()
        with:
          tag_name: magisk-${{ env.MAGISK_VERS }}
          name: "Magisk ${{ env.MAGISK_VERS }} Build"
          body: |
            Unofficial build from ${{ inputs.MAGISK_REPO }}@${{ inputs.MAGISK_BRANCH }}
            Generated at ${{ github.run_id }}
          files: |
            Magisk/out/app-release.apk
            Magisk/out/stub-release.apk
          draft: false
          prerelease: false