name: Magisk Build (Binaries Only)

on:
  workflow_dispatch:
    inputs:
      MAGISK_REPO:
        description: 'Magisk Repository'
        required: true
        default: 'https://github.com/zcg9783/Magisk'
      MAGISK_BRANCH:
        description: 'Magisk Repository Branch'
        required: true
        default: 'v22.1'

jobs:
  build:
    name: Build Magisk Binaries
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIRECT: false
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Clone Magisk
        run: |
          git clone --recurse-submodules ${{ inputs.MAGISK_REPO }} -b ${{ inputs.MAGISK_BRANCH }} ./Magisk
          echo "MAGISK_VERS=$(awk -F'=' '/magisk.versionCode/ {print $2}' Magisk/gradle.properties)" >> $GITHUB_ENV

      - name: Modify build.py to remove APK builds
        run: |
          sed -i '/self\.build_apk/d' Magisk/build.py

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: ${{ runner.os }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}
          max-size: 10000M

      - name: Set up NDK
        run: cd Magisk && python build.py -v ndk
        shell: bash  

      - name: Setup environment
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install --only-upgrade libstdc++6 -y

      - name: Build binaries
        run: |
          cd Magisk
          # Build only native binaries
          ./build.py -vr magisk magiskinit magiskboot busybox

      - name: Collect binaries
        run: |
          mkdir Magisk/out/binaries
          cp -r Magisk/native/out/* Magisk/out/binaries/

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-binaries-${{ github.sha }}
          path: Magisk/out
          compression-level: 9